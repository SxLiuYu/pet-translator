name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements-test.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r server/requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/ -q -W error::DeprecationWarning

      - name: Compile Python sources
        run: python -m compileall -q server tests

      - name: Check whitespace
        run: git diff --check
